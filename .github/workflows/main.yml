name: Build Launcher

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyinstaller
      - run: |
          pyinstaller --onefile --windowed --name "MIDI Gen" launcher/launcher.py
      - uses: actions/upload-artifact@v4
        with:
          name: MIDI-Gen-Windows
          path: dist/MIDI Gen.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyinstaller
      - run: |
          pyinstaller --onefile --windowed --name "MIDI Gen" launcher/launcher.py
      - uses: actions/upload-artifact@v4
        with:
          name: MIDI-Gen-macOS
          path: dist/MIDI Gen.app
